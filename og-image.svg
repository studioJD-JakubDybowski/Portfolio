<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141814"/>
      <stop offset="100%" style="stop-color:#1D2420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BCD94A"/>
      <stop offset="100%" style="stop-color:#88A020"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#A8C434;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#141814;stop-opacity:0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="rgba(30,42,28,0.15)"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(30,42,28,0.12)"/>
    </filter>
  </defs>

  <!-- Background dark -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Right panel (light) -->
  <rect x="740" y="0" width="460" height="630" fill="#F2F5EC"/>
  <rect x="740" y="0" width="460" height="630" fill="url(#dots)"/>

  <!-- Card on right panel -->
  <rect x="820" y="155" width="300" height="320" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Row 1 -->
  <rect x="844" y="182" width="36" height="36" rx="8" fill="rgba(168,196,52,0.13)"/>
  <text x="862" y="205" font-family="Arial" font-size="15" fill="#88A020" text-anchor="middle">&#9889;</text>
  <text x="894" y="197" font-family="Arial" font-size="12" font-weight="600" fill="#1E2A1C">Szybkie strony</text>
  <text x="894" y="212" font-family="Arial" font-size="10" fill="#6A7A62">Ladowanie ponizej 1 sek.</text>
  <line x1="844" y1="230" x2="1096" y2="230" stroke="rgba(30,42,28,0.07)" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="844" y="244" width="36" height="36" rx="8" fill="rgba(168,196,52,0.13)"/>
  <text x="862" y="267" font-family="Arial" font-size="15" fill="#88A020" text-anchor="middle">&#128241;</text>
  <text x="894" y="259" font-family="Arial" font-size="12" font-weight="600" fill="#1E2A1C">Mobile-first</text>
  <text x="894" y="274" font-family="Arial" font-size="10" fill="#6A7A62">Na kazdym ekranie</text>
  <line x1="844" y1="292" x2="1096" y2="292" stroke="rgba(30,42,28,0.07)" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="844" y="306" width="36" height="36" rx="8" fill="rgba(168,196,52,0.13)"/>
  <text x="862" y="329" font-family="Arial" font-size="15" fill="#88A020" text-anchor="middle">&#128269;</text>
  <text x="894" y="321" font-family="Arial" font-size="12" font-weight="600" fill="#1E2A1C">Widoczny w Google</text>
  <text x="894" y="336" font-family="Arial" font-size="10" fill="#6A7A62">SEO i dane strukturalne</text>

  <!-- Footer badge -->
  <rect x="844" y="368" width="252" height="34" rx="8" fill="rgba(168,196,52,0.10)" stroke="rgba(168,196,52,0.25)" stroke-width="1"/>
  <text x="970" y="390" font-family="Arial" font-size="11" font-weight="600" fill="#88A020" text-anchor="middle">Zambrow i okolice</text>

  <!-- Left side — accent bar -->
  <rect x="80" y="195" width="5" height="240" rx="2.5" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="112" y="278" font-family="Arial, sans-serif" font-size="90" font-weight="800" fill="#EFF2EA" letter-spacing="-3">JD</text>
  <text x="215" y="278" font-family="Arial, sans-serif" font-size="90" font-weight="800" fill="url(#accent)">.</text>

  <!-- Studio name -->
  <text x="112" y="326" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(239,242,234,0.40)" letter-spacing="8">STUDIOJD</text>

  <!-- Tagline -->
  <text x="112" y="400" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#EFF2EA">Profesjonalne strony</text>
  <text x="112" y="442" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#EFF2EA">dla Twojego biznesu</text>

  <!-- URL -->
  <text x="112" y="572" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="rgba(239,242,234,0.28)">studiojd.pl</text>
</svg>
