<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#8a2be2"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="230" rx="3" fill="url(#accent)"/>

  <!-- Logo / Brand -->
  <text x="116" y="270" font-family="Arial, sans-serif" font-size="90" font-weight="800" fill="white" letter-spacing="-3">JD</text>
  <text x="218" y="270" font-family="Arial, sans-serif" font-size="90" font-weight="800" fill="url(#accent)">.</text>

  <!-- Studio name -->
  <text x="116" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="8">STUDIOJD</text>

  <!-- Tagline -->
  <text x="116" y="395" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white">Profesjonalne strony internetowe</text>
  <text x="116" y="440" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white">dla Twojego biznesu</text>

  <!-- Location badge -->
  <rect x="116" y="472" width="220" height="40" rx="20" fill="rgba(138,43,226,0.2)" stroke="rgba(138,43,226,0.4)" stroke-width="1"/>
  <text x="226" y="497" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#a855f7" text-anchor="middle">📍 Zambrów i okolice</text>

  <!-- URL -->
  <text x="116" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.3)">studiojd.pl</text>
</svg>
